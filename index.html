<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 登入 / 註冊 -->
  <div id="authSection">
    <h2>登入 Anime Tracker</h2>
    <input id="username" placeholder="帳號">
    <input id="password" type="password" placeholder="密碼">
    <div class="auth-buttons">
      <button id="registerBtn">註冊</button>
      <button id="loginBtn">登入</button>
    </div>
  </div>

  <!-- 主程式區域 -->
  <div id="mainApp" style="display:none;">
    <header>
      <h1>📺 Anime Tracker</h1>
      <button id="toggleTheme">切換深色模式</button>
      <button id="logoutBtn">登出</button>
    </header>

    <section class="search-section">
      <input type="text" id="animeName" placeholder="輸入動漫名稱">
      <button id="searchBtn">搜尋</button>
      <button id="seasonBtn">本季新番</button>
    </section>

    <section id="result"></section>

    <section class="saved-list">
      <h2>⭐ 我的清單</h2>
      <div id="savedAnime"></div>
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
