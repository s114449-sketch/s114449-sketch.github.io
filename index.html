<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Anime Tracker</title>

    <link
        rel="stylesheet"
        href="style.css">
</head>

<body>

    <!-- Header -->

    <header class="header">

        <div class="logo">

            <h1>🎌 Anime Tracker</h1>

        </div>

        <div class="header-right">

            <button
                id="themeToggle"
                class="theme-btn">

                🌙 深色模式

            </button>

            <button
                id="loginBtn"
                class="login-btn">

                Google 登入

            </button>

            <div
                id="userInfo"
                class="user-info">

            </div>

        </div>

    </header>

    <!-- Search -->

    <section class="search-section">

        <h2>🔍 搜尋動漫</h2>

        <div class="search-box">

            <input
                id="searchInput"
                type="text"
                placeholder="輸入動漫名稱...">

            <button
                id="searchBtn">

                搜尋

            </button>

        </div>

        <div
            id="searchHistory"
            class="search-history">

        </div>

        <div
            id="searchResult"
            class="anime-grid">

        </div>

    </section>

    <!-- Statistics -->

    <section class="stats-section">

        <h2>📊 我的統計</h2>

        <div
            id="stats"
            class="stats-grid">

            <div class="stat-card">
                ❤️ 收藏：0
            </div>

            <div class="stat-card">
                📌 想看：0
            </div>

            <div class="stat-card">
                📺 追番中：0
            </div>

            <div class="stat-card">
                ✅ 已看完：0
            </div>

            <div class="stat-card">
                ❌ 棄坑：0
            </div>

            <div class="stat-card">
                ⭐ 平均評分：0
            </div>

        </div>

    </section>

    <!-- Filter -->

    <section>

        <h2>🏷️ 標籤篩選</h2>

        <select id="filterTag">

            <option value="">
                全部
            </option>

        </select>

    </section>

    <!-- Library -->

    <section>

        <h2>📌 想看</h2>

        <div
            id="planList"
            class="anime-grid">

        </div>

    </section>

    <section>

        <h2>📺 追番中</h2>

        <div
            id="watchingList"
            class="anime-grid">

        </div>

    </section>

    <section>

        <h2>❤️ 收藏</h2>

        <div
            id="favoriteList"
            class="anime-grid">

        </div>

    </section>

    <section>

        <h2>✅ 已看完</h2>

        <div
            id="completedList"
            class="anime-grid">

        </div>

    </section>

    <section>

        <h2>❌ 棄坑</h2>

        <div
            id="droppedList"
            class="anime-grid">

        </div>

    </section>

    <!-- Footer -->

    <footer>

        <p>
            Anime Tracker © 2025
        </p>

    </footer>

    <script
        type="module"
        src="firebaseConfig.js">
    </script>

    <script
        type="module"
        src="main.js">
    </script>

</body>
</html>
