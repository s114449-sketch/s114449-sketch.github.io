<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Anime Tracker</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<header>

<h1>Anime Tracker</h1>

<div id="userArea">

<button id="loginBtn">
Google登入
</button>

<div id="userInfo"></div>

</div>

</header>

<section class="search-section">

<input
id="searchInput"
type="text"
placeholder="搜尋動漫...">

<button id="searchBtn">
搜尋
</button>

</section>

<section>

<h2>📊 我的統計</h2>

<div id="stats">

<div>❤️ 收藏：0</div>

<div>📌 想看：0</div>

<div>📺 追番中：0</div>

<div>✅ 已看完：0</div>

<div>❌ 棄坑：0</div>

<div>⭐ 平均評分：0</div>

</div>

</section>

<section>

<h2>🏷️ 標籤篩選</h2>

<select id="filterTag">

<option value="">
全部
</option>

</select>

</section>

<section>

<h2>🔍 搜尋結果</h2>

<div
id="searchResult"
class="anime-grid">
</div>

</section>

<section>

<h2>📺 我的動漫庫</h2>

<div
id="animeLibrary"
class="anime-grid">
</div>

</section>

<script
type="module"
src="main.js">
</script>

</body>
</html>
